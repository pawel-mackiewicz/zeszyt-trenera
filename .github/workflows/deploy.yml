name: Deploy

on:
  push:
    branches:
      - staging
      - main
  workflow_dispatch:
    inputs:
      target:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - prod

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}-${{ github.event.inputs.target || 'auto' }}
  cancel-in-progress: true

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-24.04
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Light Tests
        run: pnpm run test

      - name: E2E Tests
        run: pnpm run test:e2e

      - name: Build
        run: pnpm run build

  deploy-staging:
    name: Deploy staging
    needs: checks
    if: |
      github.ref == 'refs/heads/staging' ||
      github.event.inputs.target == 'staging'
    runs-on: ubuntu-24.04
    environment: staging
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Deploy to Cloudflare staging
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env staging

  deploy-prod:
    name: Deploy prod
    needs: checks
    if: |
      github.ref == 'refs/heads/main' ||
      github.event.inputs.target == 'prod'
    runs-on: ubuntu-24.04
    environment: prod
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Deploy to Cloudflare prod
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env prod
